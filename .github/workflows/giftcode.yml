name: Top Heroes Gift Code
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  redeem:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run gift code redemption
        run: node topheroes_giftcode.mjs
      - name: Save redeemed codes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add redeemed_codes.txt
          git diff --cached --quiet || git commit -m "update redeemed codes"
          git push
