name: Top Heroes Daily Sign-in
on:
  workflow_dispatch:
jobs:
  sign-in:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay
        run: sleep $((RANDOM % 300))  # 隨機延遲 0~299 秒（5分鐘內）
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run sign-in
        run: node topheroes_signin.mjs
      - name: Keep alive
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          echo $(date) >> keepalive.txt
          git add keepalive.txt
          git commit -m "keepalive"
          git push
